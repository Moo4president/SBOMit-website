baseURL: "https://sbomit.dev/"
title: SBOMit
paginate: 5
theme: PaperMod

defaultContentLanguage: en
defaultContentLanguageInSubdir: false

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

languages:
  en:
    locale: en
    label: English
    weight: 1
    title: SBOMit
  es:
    locale: es
    label: Español
    weight: 2
    title: SBOMit
  fr:
    locale: fr
    label: Français
    weight: 3
    title: SBOMit
  zh:
    locale: zh-Hans
    label: 中文
    weight: 4
    title: SBOMit
  vi:
    locale: vi
    label: Tiếng Việt
    weight: 5
    title: SBOMit

## googleAnalytics:

minify:
  disableXML: true
  minifyOutput: true

outputs:
  home:
    - HTML
    - RSS

params:
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  title: SBOMit
  description: "Software Bill of Materials on in-toto"
  keywords: ["Software Bill of Materials", "in-toto", "attestation"]
  author: "SBOMit Maintainers"
  ## images: ["<link or path of image for opengraph, twitter-cards>"]
  DateFormat: "January 2, 2006"
  defaultTheme: dark
  disableThemeToggle: false
  disableLangToggle: true
  displayFullLangName: true

  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: false
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: false
  tocopen: false

  assets:
    # disableHLJS: true # to disable highlight.js
    # disableFingerprinting: true
    ## favicon: "<link / abs url>"
    ## favicon16x16: "<link / abs url>"
    ## favicon32x32: "<link / abs url>"
    ## apple_touch_icon: "<link / abs url>"
    ## safari_pinned_tab: "<link / abs url>"

  ## label:
    ## text: "Home"
    ## icon: /apple-touch-icon.png
    ## iconHeight: 35

  socialIcons:
    - name: github
      url: "https://github.com/SBOMit/specification"
    - name: slack
      # OpenSSF Slack join; Community page lists #sbomit and #sig-sbom-everywhere.
      url: "https://slack.openssf.org/"

  analytics:
    google:
      SiteVerificationTag: "XYZabc"

  cover:
    hidden: true # hide everywhere but not in structured data
    hiddenInList: true # hide on list pages and home
    hiddenInSingle: true # hide on single page

menu:
  main:
    - identifier: intoto
      name: in-toto
      url: https://in-toto.io/
      weight: 3
    - identifier: witness
      name: witness.dev
      url: https://witness.dev
      weight: 5
    - identifier: manifesto
      name: Manifesto
      url: https://github.com/SBOMit/specification
      weight: 10
    - identifier: community
      name: Community
      url: /community/
      weight: 20
    - identifier: documentation
      name: Documentation
      url: /documentation/
      weight: 30
    - identifier: faq
      name: FAQ
      url: /faq/
      weight: 40
    - identifier: legal
      name: Legal
      url: /charter/
      weight: 50
# Read: https://github.com/adityatelange/hugo-PaperMod/wiki/FAQs#using-hugos-syntax-highlighter-chroma
pygmentsUseClasses: true
markup:
  highlight:
    noClasses: false
    # anchorLineNos: true
    # codeFences: true
    # guessSyntax: true
    # lineNos: true
    # style: monokai
