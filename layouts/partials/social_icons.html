<div class="social-icons" {{ with .align}}align="{{.}}" {{- end }}>
    {{- range site.Params.socialIcons }}
    <a href="{{ trim .url " " | safeURL }}" target="_blank" rel="noopener noreferrer me"
        title="{{ (.title | default .name) | title }}">
        {{- if eq .name "slack" -}}
            {{- with resources.Get "slack.svg" -}}
            <img class="social-icon-img social-icon-slack" src="{{ .RelPermalink }}" alt="" width="24" height="24">
            {{- else -}}
            {{ partial "svg.html" . }}
            {{- end -}}
        {{- else -}}
            {{ partial "svg.html" . }}
        {{- end -}}
    </a>
    {{- end }}
</div>
